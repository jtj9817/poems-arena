options:
  logging: CLOUD_LOGGING_ONLY
timeout: 1800s
steps:
  # Build the API image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'build',
        '-t',
        'us-west1-docker.pkg.dev/solheim-project/sanctuary/api:latest',
        '-f',
        'apps/api/Dockerfile',
        '.',
      ]
  # Build the Web image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'build',
        '-t',
        'us-west1-docker.pkg.dev/solheim-project/sanctuary/web:latest',
        '--build-arg',
        'VITE_API_URL=/api/v1',
        '-f',
        'apps/web/Dockerfile',
        '.',
      ]
  # Deploy the service using service.yaml
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        sed "s/\${SERVICE_ACCOUNT_EMAIL}/237062568374-compute@developer.gserviceaccount.com/g" service.yaml > service.deployed.yaml
        gcloud run services replace service.deployed.yaml --region us-west1
images:
  - 'us-west1-docker.pkg.dev/solheim-project/sanctuary/api:latest'
  - 'us-west1-docker.pkg.dev/solheim-project/sanctuary/web:latest'
