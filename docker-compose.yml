name: classicist-sanctuary

services:
  sanctuary-api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - '4000:4000'
    env_file:
      - .env
    restart: unless-stopped

  sanctuary-web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: /api/v1
    ports:
      - '3001:80'
    depends_on:
      - sanctuary-api
    restart: unless-stopped
