# ── Version bump precondition ──────────────────────────────────────────────────
# This pipeline is the required gate before any version bump.
# The bump script (scripts/bump-version.ts) queries the last successful run of
# THIS pipeline on the main branch via:
#
#   gcloud builds list \
#     --filter="substitutions.BRANCH_NAME=main AND status=SUCCESS" \
#     --format="value(id,startTime)" \
#     --limit=1
#
# If no successful run is found, the script exits non-zero and no version files
# are modified. After a successful build, run:
#
#   pnpm version:minor   # increment x.y → x.(y+1)  [or (x+1).0 if y >= 10]
#   pnpm version:major   # increment x.y → (x+1).0
#
# See scripts/bump-version.ts for full documentation.
# ──────────────────────────────────────────────────────────────────────────────
options:
  logging: CLOUD_LOGGING_ONLY
timeout: 1800s
steps:
  # Build the API image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'build',
        '-t',
        'us-west1-docker.pkg.dev/solheim-project/sanctuary/api:latest',
        '-f',
        'apps/api/Dockerfile',
        '.',
      ]
  # Build the Web image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'build',
        '-t',
        'us-west1-docker.pkg.dev/solheim-project/sanctuary/web:latest',
        '--build-arg',
        'VITE_API_URL=/api/v1',
        '-f',
        'apps/web/Dockerfile',
        '.',
      ]
  # Deploy the service using service.yaml
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail

        APP_VERSION="$(grep -o '\"version\": \"[0-9]\\+\\.[0-9]\\+\"' package.json | grep -o '[0-9]\\+\\.[0-9]\\+')"
        if [[ -z "$APP_VERSION" ]]; then
          echo "Error: could not parse version from package.json" >&2
          exit 1
        fi
        APP_VERSION_LABEL="${APP_VERSION//./-}"

        SERVICE_ACCOUNT_EMAIL="237062568374-compute@developer.gserviceaccount.com"
        API_IMAGE_REF="us-west1-docker.pkg.dev/solheim-project/sanctuary/api:latest"
        WEB_IMAGE_REF="us-west1-docker.pkg.dev/solheim-project/sanctuary/web:latest"

        awk \
          -v service_account="$SERVICE_ACCOUNT_EMAIL" \
          -v api_image_ref="$API_IMAGE_REF" \
          -v web_image_ref="$WEB_IMAGE_REF" \
          -v app_version="$APP_VERSION" \
          -v app_version_label="$APP_VERSION_LABEL" \
          '{
            gsub(/\\$\\{SERVICE_ACCOUNT_EMAIL\\}/, service_account);
            gsub(/\\$\\{API_IMAGE_REF\\}/, api_image_ref);
            gsub(/\\$\\{WEB_IMAGE_REF\\}/, web_image_ref);
            gsub(/\\$\\{APP_VERSION\\}/, app_version);
            gsub(/\\$\\{APP_VERSION_LABEL\\}/, app_version_label);
            print;
          }' \
          service.yaml > service.deployed.yaml

        gcloud run services replace service.deployed.yaml --region us-west1
images:
  - 'us-west1-docker.pkg.dev/solheim-project/sanctuary/api:latest'
  - 'us-west1-docker.pkg.dev/solheim-project/sanctuary/web:latest'
