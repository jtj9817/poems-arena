<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Classicist's Sanctuary</title>

    <!-- Google Fonts: Piazzolla (Display), EB Garamond (Body), Libre Franklin (UI) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Libre+Franklin:wght@300;400;500&family=Piazzolla:ital,opsz,wght@0,8..30,100..900;1,8..30,100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Material Symbols for Icons -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
    />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              ink: '#2C2925',
              paper: '#F4F1EA',
              stock: '#EBE7DE',
              pencil: '#8C8781',
              'seal-red': '#9E3E36',
              'binding-blue': '#3A5A6D',
              'border-pencil': '#D6D1C9',
            },
            fontFamily: {
              serif: ['Piazzolla', 'serif'],
              body: ['EB Garamond', 'serif'],
              sans: ['Libre Franklin', 'sans-serif'],
            },
            backgroundImage: {
              noise:
                "url('data:image/svg+xml,%3Csvg viewBox=%220 0 200 200%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22noiseFilter%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.65%22 numOctaves=%223%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23noiseFilter)%22 opacity=%220.04%22/%3E%3C/svg%3E')",
            },
          },
        },
      };
    </script>
    <style>
      /* Custom utilities that are hard to do purely with Tailwind classes */
      .paper-shadow {
        box-shadow:
          0 1px 1px hsl(0deg 0% 0% / 0.075),
          0 2px 2px hsl(0deg 0% 0% / 0.075),
          0 4px 4px hsl(0deg 0% 0% / 0.075);
      }
      body {
        background-color: #f4f1ea;
        color: #2c2925;
      }
      /* Hide scrollbar for clean reading mode in non-poem areas */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      /* Custom Scrollbar for Letterpress Theme */
      .letterpress-scroll {
        scrollbar-width: thin;
        scrollbar-color: #d6d1c9 transparent;
      }
      .letterpress-scroll::-webkit-scrollbar {
        width: 6px;
      }
      .letterpress-scroll::-webkit-scrollbar-track {
        background: transparent;
      }
      .letterpress-scroll::-webkit-scrollbar-thumb {
        background-color: #d6d1c9;
        border-radius: 20px;
      }
      .letterpress-scroll::-webkit-scrollbar-thumb:hover {
        background-color: #8c8781;
      }

      /* Swipe transition keyframes for SwipeContainer */
      @keyframes swipeOutLeft {
        from {
          transform: translateX(0);
          opacity: 1;
        }
        to {
          transform: translateX(-60px);
          opacity: 0;
        }
      }
      @keyframes swipeInRight {
        from {
          transform: translateX(60px);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }

      /* Verdict pop-up entrance */
      @keyframes verdictIn {
        from {
          opacity: 0;
          transform: translateY(-12px) scale(0.97);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      /* Fade-in used by ReadingRoom initial load */
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body class="antialiased font-body bg-paper selection:bg-ink selection:text-paper">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
